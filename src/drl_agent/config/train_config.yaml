train_settings:
  seed: 42
  use_checkpoints: true
  load_model: false
  timesteps_before_training: 5000  #预训练阶段
  eval_freq: 5000                   #评估频率
  eval_eps: 10
  max_timesteps: 100000             #最大训练步数
  max_episode_steps: 500            #每回合最大步数
  base_file_name: "td7_agent"

